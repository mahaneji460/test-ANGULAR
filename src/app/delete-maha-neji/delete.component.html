<div class="container mt-4" *ngIf="id != null">
  <h2 class="h5 mb-3">Supprimer la résidence</h2>

  <p>Voulez-vous vraiment supprimer la résidence avec l'identifiant <strong>{{ id }}</strong> ?</p>
  <p class="text-danger small mb-3">Cette action est définitive.</p>

  <div *ngIf="error" class="alert alert-danger py-2 px-3">
    {{ error }}
  </div>

  <button class="btn btn-outline-danger btn-sm me-2" (click)="confirmDelete()" [disabled]="loading">
    Oui, supprimer
  </button>
  <button class="btn btn-outline-secondary btn-sm" (click)="cancel()" [disabled]="loading">
    Annuler
  </button>
</div>

<div class="container mt-4" *ngIf="id == null">
  <div class="alert alert-danger py-2 px-3 mb-3">
    Identifiant invalide.
  </div>
  <button class="btn btn-outline-secondary btn-sm" (click)="cancel()">
    Retour à la liste
  </button>
</div>
