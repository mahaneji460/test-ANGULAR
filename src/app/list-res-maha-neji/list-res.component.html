<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h5 mb-0">Résidences</h2>
    <a routerLink="/add-residence" class="btn btn-dark btn-sm">
      Ajouter
    </a>
  </div>

  <div *ngIf="residences?.length; else emptyState">
    <div class="row g-3">
      <div class="col-sm-6 col-lg-4" *ngFor="let r of residences">
        <div class="card h-100 border-0 shadow-sm">
          <div class="card-body d-flex flex-column">
            <h3 class="h6 card-title mb-1">{{ r.name }}</h3>
            <p class="card-text small mb-1 text-muted">
              {{ r.address }}
            </p>
            <p class="card-text small mb-3">
              <strong>Status :</strong> {{ r.status }}
            </p>

            <div class="mt-auto d-flex gap-2">
              <button
                class="btn btn-outline-secondary btn-sm"
                (click)="viewDetails(r.id)">
                Détails
              </button>
              <button
                class="btn btn-outline-secondary btn-sm"
                (click)="updateResidence(r.id)">
                Modifier
              </button>
              <button
                class="btn btn-outline-danger btn-sm ms-auto"
                (click)="deleteResidence(r.id)">
                Supprimer
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <p class="text-muted mb-0">Aucune résidence pour le moment.</p>
  </ng-template>
</div>
